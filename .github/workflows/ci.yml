name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        env:
          ADMIN_TOKEN: ci-dummy
          INTERNAL_API_SECRET: ci-dummy
        run: docker compose -f docker-compose.yml config --quiet
