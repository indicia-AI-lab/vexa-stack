# Release-pipeline conform de teamstandaard (kennisbank dokploy-deploy), met één
# afwijking: er wordt niets gebouwd. De stack draait gepubliceerde upstream-images
# (Vexa, Apache-2.0); de "build"-stap is hier een MIRROR — de gepinde upstream-tags
# worden manifest-voor-manifest naar onze GHCR gekopieerd (docker buildx imagetools,
# geen rebuild), waarna de deploy-job op de ecom-runner de Dokploy-webhook aanroept.
#
# Versie bumpen = de ${IMAGE_TAG:-…}-defaults in docker-compose.yml aanpassen,
# committen op main, en een release-tag X.Y.Z pushen.
name: Deploy

on:
  push:
    tags: ["*.*.*"]
  workflow_dispatch:

permissions: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: "Guard: tag moet op main staan"
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main --quiet
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main \
            || { echo "::error::Tag staat niet op main"; exit 1; }
      - name: Validate compose config
        env:
          ADMIN_TOKEN: ci-dummy
          INTERNAL_API_SECRET: ci-dummy
        run: docker compose -f docker-compose.yml config --quiet

  mirror:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror gepinde upstream-images naar GHCR
        env:
          ADMIN_TOKEN: ci-dummy
          INTERNAL_API_SECRET: ci-dummy
        run: |
          set -euo pipefail
          # De te mirroren images komen uit de compose-config zelf (single source
          # of truth): alle ghcr.io-refs. Het bot-image valt hier bewust buiten —
          # dat pullt de host-daemon anoniem van Docker Hub (zie compose-comment).
          # Upstream-bron = zelfde naam:tag onder docker.io/vexaai.
          images=$(docker compose -f docker-compose.yml config --format json \
            | jq -r '([.services[].image] + [.services.runtime.environment.BROWSER_IMAGE]) | .[]' \
            | grep '^ghcr\.io/' | sort -u)
          echo "Te mirroren:"; echo "$images"
          for img in $images; do
            src="docker.io/vexaai/${img##*/vexa-stack/}"
            echo "→ $src ⇒ $img"
            docker buildx imagetools create --tag "$img" "$src"
          done

  deploy:
    needs: mirror
    runs-on: [ecom]
    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          : "${DOKPLOY_WEBHOOK_URL:?repo-secret DOKPLOY_WEBHOOK_URL ontbreekt}"
          curl -fsS --max-time 60 "$DOKPLOY_WEBHOOK_URL"
